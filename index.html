<!DOCTYPE html>
<html>
<head>
    <title>Ashmi's Website</title>

    <style>
        body {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            text-align: center;
            font-family: Arial;
            color: white;
            padding-top: 100px;
        }

        input {
            padding: 8px;
            border-radius: 5px;
            border: none;
                    }

        button {
            padding: 8px 15px;
            border-radius: 5px;
            border: none;
            background-color: black;
            color: white;
            cursor: pointer;
        }

        h1 {
            margin-bottom: 30px;
        }
    </style>
</head>

<body>
    <h1>Welcome to My Website 🌐</h1>

    <input type="text" id="nameInput" placeholder="Enter your name">
    <button onclick="showMessage()">Submit</button>

    <h2 id="message"></h2>

    <script>
        function showMessage() {
            var name = document.getElementById("nameInput").value;
            document.getElementById("message").innerHTML =
                "Welcome, " + name + " 💖";
        }
    </script>

</body>
</html>
