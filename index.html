    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        header {
            padding: 40px 20px;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 1px;
            animation: fadeIn 1s ease-in;
        }

        section {
            padding: 50px 20px;
            animation: slideUp 1s ease-in;
        }

        h2 {
            color: #ffdd59;
            margin-bottom: 20px;
              }

        .card {
            background: rgba(255, 255, 255, 0.1);
            margin: 15px auto;
            padding: 25px;
            width: 80%;
            border-radius: 15px;
            transition: transform 0.3s, background 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
        }
        button {
            padding: 12px 25px;
            background: #ffdd59;
            border: none;
            color: #111;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background: #ffc107;
            transform: scale(1.05);
        }

        img {
            border-radius: 50%;
            margin: 15px 0;
        }
        /* Animations */
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideUp {
            from {opacity: 0; transform: translateY(50px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
