<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ashmi Portfolio</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
#home {
  margin-top: 120px;
}
    <style>
     nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.9);
  padding: 15px;
  text-align: center;
  z-index: 1000;
}

nav a {
  position: relative;
  color: white;
  margin: 15px;
  text-decoration: none;
  font-weight: bold;
  font-size: 18px;
}

nav a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -5px;
  width: 0%;
  height: 2px;
  background: #ffdd59;
  transition: width 0.3s ease;
}

nav a:hover::after {
  width: 100%;
}

nav a:hover {
  color: #ffdd59;
}

body {
  body {
  margin: 0;
 
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(to right, #6a11cb, #2575fc);
  color: white;
  text-align: center;
  overflow-x: hidden;
}
    html {
  scroll-behavior: smooth;
}
        body {
  margin: 0;
  padding-top: 80px;
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(to right, #6a11cb, #2575fc);
  color: white;
  text-align: center;
  overflow-x: hidden;
}
        header {
    margin-top: 120px;
    padding: 40px 20px;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 1px;
    animation: fadeIn 1s ease-in;
}
        section {
            padding: 50px 20px;
            animation: slideUp 1s ease-in;
        }

        h2 {
            color: #ffdd59;
            margin-bottom: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            margin: 15px auto;
            padding: 25px;
            width: 80%;
            border-radius: 15px;
            transition: transform 0.3s, background 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
        }
        button {
            padding: 12px 25px;
            background: #ffdd59;
            border: none;
            color: #111;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background: #ffc107;
            transform: scale(1.05);
        }

        img {
            border-radius: 50%;
            margin: 15px 0;
        }
         /* Animations */
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideUp {
            from {opacity: 0; transform: translateY(50px);}
            to {opacity: 1; transform: translateY(0);}
        }

        /* Mobile Responsive */
        @media screen and (max-width: 600px) {
            .card {
                width: 95%;
            }

            header {
                font-size: 28px;
            }
        }
        .light-mode {
  background: white;
  color: black;
}

.light-mode .card {
  background: #f4f4f4;
  color: black;
}

.light-mode nav {
  background: #ddd;
}

.light-mode nav a {
  color: black;
}
    nav a.active {
  color: #ffdd59;
  border-bottom: 2px solid #ffdd59;
}
#typing {
  display: inline-block;
  font-size: 40px;
  font-weight: bold;
  background: linear-gradient(45deg, #ffdd59, #ff6b81, #6a11cb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 10px rgba(255, 221, 89, 0.7);
}
#typing::after {
  content: "|";
  margin-left: 5px;
  font-weight: bold;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0; }
  100% { opacity: 1; }
}
    .contact-card {
  background: rgba(255, 255, 255, 0.1);
  padding: 30px;
  border-radius: 15px;
  width: 80%;
  margin: auto;
}

form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input, textarea {
  padding: 12px;
  border: none;
  border-radius: 8px;
  outline: none;
  font-family: inherit;
}
input:focus, textarea:focus {
  box-shadow: 0 0 10px rgba(255, 221, 89, 0.8);
}
    </style>
</head>

<body>
<nav>
  <a href="#home">Home</a>
  <a href="#skills">Skills</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>

  <button onclick="toggleMode()">🌙</button>
</nav>
    
<header>
    <h1 id="typing"></h1>
</header>
<section id="home">
    <h2>About Me</h2>
    <p>I am learning web development and building real projects with HTML, CSS, and JavaScript.</p>
</section>

<section id="skills">
    <h2>My Skills</h2>
    <div class="card">HTML</div>
    <div class="card">CSS</div>
    <div class="card">JavaScript</div>
    <div class="card">Python</div>
</section>
<section id="projects">
    <h2>My Projects</h2>
    <div class="card">Simple Calculator</div>
    <div class="card">Dynamic Welcome Website</div>
</section>

<section id="contact">
    <h2>Contact Me</h2>
    <div class="contact-card">
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message" rows="5" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>
</section>
<script>
function toggleMode() {
  document.body.classList.toggle("light-mode");
}
</script>
<script>
const text = "Hi, I'm Ashmi 👋 | Web Developer";
let index = 0;

function typeEffect() {
  if (index < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(index);
    index++;
    setTimeout(typeEffect, 100);
  }
}

typeEffect();
</script>
    <script>
const sections = document.querySelectorAll("section");
const navLinks = document.querySelectorAll("nav a");

window.addEventListener("scroll", () => {
  let current = "";

  sections.forEach(section => {
    const sectionTop = section.offsetTop;
    const sectionHeight = section.clientHeight;

    if (pageYOffset >= sectionTop - 150) {
      current = section.getAttribute("id");
    }
  });

  navLinks.forEach(link => {
    link.classList.remove("active");
    if (link.getAttribute("href") === "#" + current) {
      link.classList.add("active");
    }
  });
    });
</script>
</body>
</html>
    
</html>
